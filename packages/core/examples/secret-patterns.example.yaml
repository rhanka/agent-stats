# Custom secret patterns for `agent-stats clean --secret-patterns <this file>`.
#
# These regexes are applied ON TOP of secretlint's preset-recommend rules, to
# catch organisation-specific token formats the generic rules don't know about.
# Each match is redacted to `<<SECRET:custom_<id>:<hash>>>` (the raw value is
# never written). The `g` flag is always enforced; add others in `flags`.
#
# Format: a top-level list, or a `patterns:` key holding the list.

patterns:
  # Example: a Sentropic-style internal token `stp_<32 url-safe chars>`.
  - id: sentropic-token
    pattern: 'stp_[A-Za-z0-9_-]{32}'

  # Example: an internal service API key header value.
  - id: sentropic-svc-key
    pattern: 'SVC-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}'

  # Example: a bearer token for an internal host (case-insensitive).
  - id: internal-bearer
    pattern: 'bearer\s+[A-Za-z0-9._-]{40,}'
    flags: 'i'
