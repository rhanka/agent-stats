name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install
        run: npm ci || npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify tag matches package versions
        run: |
          TAG="${GITHUB_REF##*/v}"
          CORE_VERSION=$(node -p "require('./packages/core/package.json').version")
          CLI_VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "tag=$TAG core=$CORE_VERSION cli=$CLI_VERSION"
          if [ "$TAG" != "$CORE_VERSION" ] || [ "$TAG" != "$CLI_VERSION" ]; then
            echo "::error::Tag v$TAG does not match package versions (core=$CORE_VERSION cli=$CLI_VERSION)"
            exit 1
          fi

      - name: Publish core (@sentropic/agent-stats-core)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace=packages/core --access public --provenance

      - name: Publish CLI (@sentropic/agent-stats)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace=packages/cli --access public --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"
          PREV_TAG=$(git describe --tags --abbrev=0 --match='v*' "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:'- %s (%h)' "$PREV_TAG..$TAG")
            RANGE_LABEL="since $PREV_TAG"
          else
            NOTES=$(git log --pretty=format:'- %s (%h)')
            RANGE_LABEL="initial release"
          fi
          {
            echo "## $TAG"
            echo
            echo "Packages: \`@sentropic/agent-stats-core@${TAG#v}\` + \`@sentropic/agent-stats@${TAG#v}\`."
            echo
            echo "### Changes ($RANGE_LABEL)"
            echo
            echo "$NOTES"
          } > /tmp/release-notes.md
          gh release create "$TAG" --notes-file /tmp/release-notes.md --title "$TAG"
